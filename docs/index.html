<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>어흐랭</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --border: #d7deea;
      --text: #101828;
      --muted: #667085;
      --accent: #2563eb;
      --accent-strong: #1d4ed8;
      --terminal-bg: #0f172a;
      --terminal-text: #e2e8f0;
      --error-bg: #fff1f2;
      --error-border: #fecdd3;
      --error-text: #be123c;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
    }

    .app {
      width: min(1100px, calc(100% - 24px));
      margin: 18px auto;
      display: grid;
      gap: 12px;
    }

    .title {
      padding: 6px 2px 2px;
      font-size: clamp(22px, 3vw, 30px);
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .toolbar,
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 12px;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(320px, 0.8fr);
      gap: 12px;
    }

    .footer {
      padding: 2px 4px 10px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    .panel {
      overflow: hidden;
    }

    .panel-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      font-weight: 700;
    }

    .panel-body {
      padding: 12px;
    }

    select,
    button,
    textarea {
      font: inherit;
    }

    select,
    button {
      height: 40px;
      border-radius: 10px;
    }

    select {
      min-width: 160px;
      padding: 0 12px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
    }

    button {
      padding: 0 14px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      cursor: pointer;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    button.primary:hover {
      background: var(--accent-strong);
    }

    button:hover {
      border-color: #c6cfdb;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
    }

    textarea,
    .terminal {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: "IBM Plex Mono", "D2Coding", "Cascadia Mono", monospace;
      font-size: 14px;
      line-height: 1.68;
    }

    textarea {
      min-height: 620px;
      padding: 14px;
      resize: vertical;
      background: #fff;
      color: var(--text);
    }

    .terminal {
      min-height: 620px;
      padding: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      background: var(--terminal-bg);
      color: var(--terminal-text);
    }

    .terminal.error {
      background: var(--error-bg);
      border-color: var(--error-border);
      color: var(--error-text);
    }

    @media (max-width: 900px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      textarea,
      .terminal {
        min-height: 320px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="title">ㅗㅜㅑ... 어흐...</div>

    <section class="toolbar">
      <select id="example-select" aria-label="예제 선택">
        <option value="blank">빈 템플릿</option>
        <option value="print_1_plus_1">1+1 출력</option>
        <option value="hello_world">Hello World!</option>
      </select>
      <button id="load-example" type="button">불러오기</button>
      <button id="copy-code" type="button">복사</button>
      <button class="primary" id="run-program" type="button">실행</button>
      <span class="hint">Ctrl+Enter 실행</span>
    </section>

    <section class="workspace">
      <section class="panel">
        <div class="panel-head">code.eohu</div>
        <div class="panel-body">
          <textarea id="source" spellcheck="false"></textarea>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">output</div>
        <div class="panel-body">
          <div class="terminal" id="output">(대기 중)</div>
        </div>
      </section>
    </section>

    <div class="footer">GPU야 미안해...</div>
  </main>

  <script>
    const DECLARATION_KEYS = {
      "ㅇㅎ": "+",
      "대꼴": "-",
      "후방주의": ">",
      "19": "<",
      "꼴.": ".",
      "꼴,": ",",
    };

    const RESERVED_TOKENS = {
      "어흐ㅋㅋ": "[",
      "ㅗㅜㅑ": "]",
    };

    const DEFAULT_DECLARATION_ORDER = ["ㅇㅎ", "대꼴", "후방주의", "19", "꼴.", "꼴,"];
    const DEFAULT_BODY_MAP = {
      "어흐.": "+",
      "어흐,": "-",
      "어흐..": ">",
      "어흐,,": "<",
      "어흐...": ".",
      "어흐,,,": ",",
      ...RESERVED_TOKENS,
    };

    const EXAMPLES = {
      blank: `ㅇㅎ = 어흐.
대꼴 = 어흐,
후방주의 = 어흐..
19 = 어흐,,
꼴. = 어흐...
꼴, = 어흐,,,

`,
      print_1_plus_1: `ㅇㅎ = 어흐.
대꼴 = 어흐,
후방주의 = 어흐..
19 = 어흐,,
꼴. = 어흐...
꼴, = 어흐,,,

어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐ㅋㅋ 어흐.. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐,, 어흐, ㅗㅜㅑ 어흐.. 어흐... 어흐, 어흐, 어흐, 어흐, 어흐, 어흐, 어흐... 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐...
`,
      hello_world: `ㅇㅎ = 어흐.
대꼴 = 어흐,
후방주의 = 어흐..
19 = 어흐,,
꼴. = 어흐...
꼴, = 어흐,,,

어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐ㅋㅋ 어흐.. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐.. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐.. 어흐. 어흐. 어흐. 어흐.. 어흐. 어흐,, 어흐,, 어흐,, 어흐,, 어흐, ㅗㅜㅑ 어흐.. 어흐. 어흐. 어흐... 어흐.. 어흐. 어흐... 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐... 어흐... 어흐. 어흐. 어흐. 어흐... 어흐.. 어흐. 어흐. 어흐... 어흐,, 어흐,, 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐. 어흐... 어흐.. 어흐... 어흐. 어흐. 어흐. 어흐... 어흐, 어흐, 어흐, 어흐, 어흐, 어흐, 어흐... 어흐, 어흐, 어흐, 어흐, 어흐, 어흐, 어흐, 어흐, 어흐... 어흐.. 어흐. 어흐... 어흐.. 어흐...
`,
    };

    const sourceEl = document.getElementById("source");
    const outputEl = document.getElementById("output");
    const exampleSelect = document.getElementById("example-select");

    function stripComment(line) {
      return line.split("#", 1)[0].trim();
    }

    function parseDeclaration(line) {
      if (!line.includes("=")) {
        throw new Error(`잘못된 선언문입니다: ${line}`);
      }
      const [rawKey, rawToken] = line.split("=", 2);
      const key = rawKey.trim();
      const token = rawToken.trim();
      if (!(key in DECLARATION_KEYS)) {
        throw new Error(`알 수 없는 선언 키워드입니다: ${key}`);
      }
      if (!(token in DEFAULT_BODY_MAP) || token in RESERVED_TOKENS) {
        throw new Error(`선언에 사용할 수 없는 토큰입니다: ${token}`);
      }
      return [key, token];
    }

    function tokenizeBody(body, tokenMap) {
      const tokens = Object.keys(tokenMap).sort((a, b) => b.length - a.length);
      let index = 0;
      const parsed = [];

      while (index < body.length) {
        if (/\s/.test(body[index])) {
          index += 1;
          continue;
        }
        const match = tokens.find((token) => body.startsWith(token, index));
        if (!match) {
          throw new Error(`본문을 해석할 수 없습니다: ${body.slice(index, index + 12)}`);
        }
        parsed.push(match);
        index += match.length;
      }

      return parsed;
    }

    function validateBrackets(program) {
      let depth = 0;
      for (const instruction of program) {
        if (instruction === "[") {
          depth += 1;
        } else if (instruction === "]") {
          depth -= 1;
          if (depth < 0) {
            throw new Error("ㅗㅜㅑ가 어흐ㅋㅋ보다 먼저 나왔습니다.");
          }
        }
      }
      if (depth !== 0) {
        throw new Error("어흐ㅋㅋ와 ㅗㅜㅑ의 개수가 맞지 않습니다.");
      }
    }

    function parseProgram(source) {
      const declarations = {};
      const bodyFragments = [];

      for (const rawLine of source.split(/\r?\n/)) {
        const line = stripComment(rawLine);
        if (!line) {
          continue;
        }
        if (line.includes("=")) {
          const [key, token] = parseDeclaration(line);
          declarations[key] = token;
        } else {
          bodyFragments.push(line);
        }
      }

      const missing = DEFAULT_DECLARATION_ORDER.filter((key) => !(key in declarations));
      if (missing.length) {
        throw new Error(`필수 선언이 없습니다: ${missing.join(", ")}`);
      }

      const usedTokens = Object.values(declarations);
      if (new Set(usedTokens).size !== usedTokens.length) {
        throw new Error("선언 토큰은 서로 달라야 합니다.");
      }

      const tokenToBf = {};
      for (const [key, token] of Object.entries(declarations)) {
        tokenToBf[token] = DECLARATION_KEYS[key];
      }
      Object.assign(tokenToBf, RESERVED_TOKENS);

      const bodyTokens = tokenizeBody(bodyFragments.join(""), tokenToBf);
      const brainfuck = bodyTokens.map((token) => tokenToBf[token]).join("");
      validateBrackets(brainfuck);
      return brainfuck;
    }

    function buildJumpTable(program) {
      const stack = [];
      const jumps = new Map();
      [...program].forEach((instruction, index) => {
        if (instruction === "[") {
          stack.push(index);
        } else if (instruction === "]") {
          if (!stack.length) {
            throw new Error("닫는 괄호가 먼저 나왔습니다.");
          }
          const start = stack.pop();
          jumps.set(start, index);
          jumps.set(index, start);
        }
      });
      if (stack.length) {
        throw new Error("열린 괄호가 닫히지 않았습니다.");
      }
      return jumps;
    }

    function runBrainfuck(program) {
      const jumps = buildJumpTable(program);
      const tape = [0];
      let pointer = 0;
      let pc = 0;
      let output = "";

      while (pc < program.length) {
        const instruction = program[pc];
        if (instruction === ">") {
          pointer += 1;
          if (pointer === tape.length) {
            tape.push(0);
          }
        } else if (instruction === "<") {
          if (pointer === 0) {
            throw new Error("테이프 시작점보다 왼쪽으로 이동할 수 없습니다.");
          }
          pointer -= 1;
        } else if (instruction === "+") {
          tape[pointer] = (tape[pointer] + 1) % 256;
        } else if (instruction === "-") {
          tape[pointer] = (tape[pointer] + 255) % 256;
        } else if (instruction === ".") {
          output += String.fromCharCode(tape[pointer]);
        } else if (instruction === "[" && tape[pointer] === 0) {
          pc = jumps.get(pc);
        } else if (instruction === "]" && tape[pointer] !== 0) {
          pc = jumps.get(pc);
        }
        pc += 1;
      }

      return output;
    }

    function setOutput(text, isError = false) {
      outputEl.textContent = text;
      outputEl.classList.toggle("error", isError);
    }

    function runSource() {
      try {
        const brainfuck = parseProgram(sourceEl.value);
        const output = runBrainfuck(brainfuck);
        setOutput(output || "(출력 없음)");
      } catch (error) {
        setOutput(error.message, true);
      }
    }

    function loadExample() {
      sourceEl.value = EXAMPLES[exampleSelect.value];
      setOutput("(대기 중)");
      outputEl.classList.remove("error");
    }

    document.getElementById("run-program").addEventListener("click", runSource);
    document.getElementById("load-example").addEventListener("click", loadExample);
    document.getElementById("copy-code").addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(sourceEl.value);
        setOutput("복사 완료");
        outputEl.classList.remove("error");
      } catch (error) {
        setOutput("복사 실패", true);
      }
    });

    sourceEl.addEventListener("keydown", (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
        runSource();
      }
    });

    loadExample();
  </script>
</body>
</html>
